project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "reports/**/*.qmd"
    - "!templates/"

execute:
  freeze: auto

website:
  title: "Current Findings"
  site-url: "https://robertslab.github.io/current-findings/"
  description: "Open, non-peer-reviewed scientific reports, technical notes, and working manuscripts from Roberts Lab."
  favicon: assets/logo.svg
  navbar:
    logo: assets/logo.svg
    logo-alt: "Current Findings logo"
    left:
      - href: index.qmd
        text: Home
      - href: reports.qmd
        text: Reports
      - href: about.qmd
        text: About
    right:
      - icon: github
        href: https://github.com/RobertsLab/current-findings
  page-footer:
    left: "© Roberts Lab"
    right: "Not peer reviewed unless explicitly stated."

format:
  html:
    theme:
      - cosmo
      - theme.scss
    toc: true
    number-sections: true
    citations-hover: true
    footnotes-hover: true
